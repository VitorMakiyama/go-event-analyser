services:
  go-event-analyser:
    build: .
    restart: always
    ports:
      - 3333:3333
    env_file: ".env"
    depends_on:
      - db

  db:
    image: postgres:latest
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      #- ./postgres:/var/lib/postgresql # for PRD
    ports:
      - 5442:5432
    env_file: ".env"

  adminer:
    image: adminer
    restart: always
    ports:
      - 5433:8080
